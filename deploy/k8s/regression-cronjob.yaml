apiVersion: batch/v1
kind: CronJob
metadata:
  name: regression-suite
  namespace: monitoring
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 10
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 300
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: regression
              image: registry.example.com/regression-suite:latest
              command: ["regression-suite", "--config", "/etc/config/prod.yaml", "--no-color"]
              env:
                - name: DB_PASSWORD
                  valueFrom: {secretKeyRef: {name: db-credentials, key: readonly-password}}
                - name: SLACK_WEBHOOK_URL
                  valueFrom: {secretKeyRef: {name: slack-webhook, key: url}}
              volumeMounts:
                - {name: config, mountPath: /etc/config}
              resources:
                requests: {memory: "128Mi", cpu: "100m"}
                limits: {memory: "256Mi", cpu: "500m"}
          volumes:
            - name: config
              configMap: {name: regression-config}
