grpc:
  host: "sensor-service.staging.svc.cluster.local"
  port: 50051
  services: ["", "SensorService"]
postgres:
  dsn: "postgresql://readonly:${DB_PASSWORD}@db.staging.svc:5432/staging"
  max_query_latency_ms: 300
service:
  health_url: "http://sensor-service.staging.svc:8080/health"
reporting:
  console: true
  json_output_dir: "results"
  slack_webhook: "${SLACK_WEBHOOK_URL}"
  prometheus:
    enabled: true
    pushgateway_url: "http://pushgateway.monitoring.svc:9091"
    environment: "staging"
