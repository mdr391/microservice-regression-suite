name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: pip install ruff mypy
      - run: ruff check src/
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: pip install -e ".[dev]"
      - run: regression-suite --demo --json-output results/ --no-color
      - run: pytest tests/ -v
      - uses: actions/upload-artifact@v4
        if: always()
        with: {name: regression-results, path: results/}
