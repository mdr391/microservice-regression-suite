stages: [lint, test, regression-staging, regression-production]

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"

.base: &base
  image: python:3.12-slim
  cache:
    key: pip-${CI_COMMIT_REF_SLUG}
    paths: [.pip-cache/, .venv/]

lint:
  stage: lint
  <<: *base
  script:
    - pip install ruff mypy --quiet
    - ruff check src/
    - mypy src/ --ignore-missing-imports
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push"

test-demo:
  stage: test
  <<: *base
  script:
    - pip install -e ".[dev]" --quiet
    - regression-suite --demo --json-output results/ --no-color
    - pytest tests/ -v
  artifacts:
    when: always
    paths: [results/]
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push"

regression-staging:
  stage: regression-staging
  <<: *base
  script:
    - pip install -e . --quiet
    - regression-suite --config config/staging.yaml --json-output results/ --no-color
  variables:
    DB_PASSWORD: $STAGING_DB_PASSWORD
    SLACK_WEBHOOK_URL: $SLACK_WEBHOOK_URL
  environment: {name: staging}
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $REGRESSION_ENV == "staging"
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual

regression-production:
  stage: regression-production
  <<: *base
  script:
    - pip install -e . --quiet
    - regression-suite --config config/prod.yaml --json-output results/ --no-color
  variables:
    DB_PASSWORD: $PROD_DB_READONLY_PASSWORD
    SLACK_WEBHOOK_URL: $SLACK_WEBHOOK_URL
  environment: {name: production}
  allow_failure: false
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $REGRESSION_ENV == "production"
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
